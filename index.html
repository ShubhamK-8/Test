<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maafi... 🥺</title>
    <style>
        :root {
            --primary: #ff6b81;
            --background: #fff5f6;
            --text: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 129, 0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #57606f;
        }

        .heart {
            font-size: 3rem;
            color: var(--primary);
            animation: beat .3s infinite alternate;
            display: inline-block;
            margin: 15px 0;
        }

        @keyframes beat {
            to { transform: scale(1.1); }
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
            z-index: 10;
        }

        #yesBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 129, 0.4);
        }

        #noBtn {
            background-color: #ced6e0;
            color: #747d8c;
            position: absolute;
            z-index: 10;
        }

        .generator-section {
            margin-top: 40px;
            border-top: 1px solid #ffe3e6;
            padding-top: 20px;
        }

        #reasonText {
            font-style: italic;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            color: var(--primary);
            font-weight: 600;
            font-size: 1.2rem;
        }

        #genBtn {
            background-color: #f1f2f6;
            color: #57606f;
            border: 1px solid #dfe4ea;
        }

        #genBtn:hover {
            background-color: #dfe4ea;
        }

        /* Animated Sit-up Character Container */
        .character-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: situp 1.2s infinite ease-in-out;
        }

        /* Bubble text for "MAAFI" */
        .maafi-text {
            font-size: 2rem;
            font-weight: 900;
            color: #ff6b81;
            margin-top: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #ffe3e6;
        }

        @keyframes situp {
            0% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(35px) scaleY(0.8); }
            100% { transform: translateY(0) scaleY(1); }
        }
    </style>
</head>
<body>

    <!-- Audio Elements (Removed 'loop' so they only play once) -->
    <audio id="pianoMusic" src="files/abc1.mp3"></audio>
    <audio id="funnyMusic" src="files/abc2.mp3"></audio>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>I'm So Sorry...</h1>
        <p>I really hate that I hurt your feelings. You mean the absolute world to me, and I want to make things right. Will you forgive me? 🥺</p>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="forgiven()">Yes, I forgive you!</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Nope 😤</button>
        </div>

        <div class="generator-section">
            <div id="reasonText">Click below to see how sorry I am...</div>
            <button id="genBtn" onclick="generateResponse()">Click Me 🌸</button>
        </div>
    </div>

    <script>
        const pianoMusic = document.getElementById('pianoMusic');
        const funnyMusic = document.getElementById('funnyMusic');

        let toggle = true;

        const messages = [
            "Your laugh is my absolute favorite thing in the world. 🌟",
            "I'm so incredibly lucky to have you, and I promise to be more careful with my words. 💖",
            "You have the kindest heart, and I hate that I made it sad. 🥺",
            "Can we please make up? I miss my favorite person. 💐"
        ];

        // SVG code for the cute character holding ears
        const characterSVG = `
            <div class="character-box">
                <svg width="120" height="120" viewBox="0 0 100 100">
                    <path d="M50,15 C55,5 65,8 60,2" stroke="#eccc68" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <circle cx="23" cy="45" r="8" fill="#ffb8b8"/>
                    <circle cx="77" cy="45" r="8" fill="#ffb8b8"/>
                    <ellipse cx="50" cy="45" rx="27" ry="30" fill="#ffcbcb"/>
                    <path d="M42,25 Q50,32 58,25" fill="none" stroke="white" stroke-width="3"/>
                    <path d="M47,20 Q50,23 53,20" fill="none" stroke="red" stroke-width="2"/>
                    <ellipse cx="40" cy="42" rx="3.5" ry="5" fill="#2f3542"/>
                    <ellipse cx="60" cy="42" rx="3.5" ry="5" fill="#2f3542"/>
                    <circle cx="38.5" cy="40.5" r="1.2" fill="white"/>
                    <circle cx="58.5" cy="40.5" r="1.2" fill="white"/>
                    <path d="M34,35 Q40,32 44,37" fill="none" stroke="#2f3542" stroke-width="2" stroke-linecap="round"/>
                    <path d="M66,35 Q60,32 56,37" fill="none" stroke="#2f3542" stroke-width="2" stroke-linecap="round"/>
                    <path d="M40,55 Q50,48 60,55" fill="none" stroke="#2f3542" stroke-width="2" stroke-linecap="round"/>
                    <path d="M40,55 Q50,62 60,55 Z" fill="#ff6b81"/>
                    <rect x="46" y="52" width="3" height="4" rx="1" fill="white"/>
                    <rect x="51" y="52" width="3" height="4" rx="1" fill="white"/>
                    <path d="M35,75 L65,75 L62,100 L38,100 Z" fill="#ff7f50"/>
                    <ellipse cx="50" cy="75" rx="15" ry="10" fill="#ffcbcb"/>
                    <path d="M35,78 C15,70 15,45 23,45" fill="none" stroke="#ffcbcb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M65,78 C85,70 85,45 77,45" fill="none" stroke="#ffcbcb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="maafi-text">MAAFI</div>
            </div>
        `;

        function stopAllMusic() {
            try {
                if (pianoMusic) { pianoMusic.pause(); pianoMusic.currentTime = 0; }
                if (funnyMusic) { funnyMusic.pause(); funnyMusic.currentTime = 0; }
            } catch (e) {
                console.log("Audio control error:", e);
            }
        }

        function generateResponse() {
            const textEl = document.getElementById('reasonText');
            
            // 1. Stop any currently playing music safely
            stopAllMusic();

            // 2. Perform the visual change immediately so the button feels super responsive!
            if (toggle) {
                textEl.innerHTML = characterSVG;
                
                // 3. Try to play music safely in the background
                try {
                    funnyMusic.play().catch(e => console.log("Audio play blocked by browser. Visuals working fine!"));
                } catch (e) {
                    console.log("Audio load error:", e);
                }
            } else {
                const randomIndex = Math.floor(Math.random() * messages.length);
                textEl.innerHTML = `<span>${messages[randomIndex]}</span>`;
                
                try {
                    pianoMusic.play().catch(e => console.log("Audio play blocked by browser. Visuals working fine!"));
                } catch (e) {
                    console.log("Audio load error:", e);
                }
            }

            // Flip the state for the next click
            toggle = !toggle;
        }

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const container = document.querySelector('.btn-container');
            
            const containerWidth = container.clientWidth;
            const randomX = Math.floor(Math.random() * (containerWidth - 120)) - (containerWidth / 2 - 60);
            const randomY = Math.floor(Math.random() * 120) - 60;
            
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        function forgiven() {
            stopAllMusic();
            alert("Thank you ❤️ You have the best heart. I promise to make it up to you right now!");
        }
    </script>
</body>
</html>
